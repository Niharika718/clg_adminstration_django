<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <style>
        body {
            height: 100vh;
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
            background: url("https://images.unsplash.com/photo-1607237138185-eedd9c632b0b?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8Y29sbGVnZSUyMGNhbXB1c3xlbnwwfHwwfHx8MA%3D%3D") no-repeat center center/cover;
        }

        /* 🔝 Sticky Header */
        .header {
            position: sticky;
            top: 0;
            background: #2c3e50;
            color: white;
            padding: 15px;
            font-size: 20px;
            text-align: center;
            z-index: 1000;
        }

        /* 📦 Container */
        .container {
            width: 100%;           

            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 80px ;
            size:10px ;
        }

        /* 🧾 Cards */
        .card {
            width: 280px;
            height: 160px;
            background: #f3faff;
            border-radius: 15px;
            text-align: center;
            padding-top: 50px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: 0.4s;
            cursor: pointer;
        }

        /* ✨ Hover Effect */
        .card:hover {
            transform: translateY(-15px) scale(1.05);
            background: #db34a9;
            color: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .card a {
            text-decoration: none;
            color: inherit;
            font-size: 20px;
            font-weight: bold;
        }
        
        .open-btn {
    display: inline-block;
    margin-top: 10px;
     padding: 12px 55px;   /* 🔥 increases size */
    font-size: 50px; 
    background: #34db74;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}


    </style>
</head>

<body>

    <!-- 🔝 Header -->
    <div class="header">
        Administration Panel

        <a href="/logout/" style="
        float:right;
        color:white;
        text-decoration:none;
        font-size:14px;
        background:red;
        padding:5px 10px;
        border-radius:5px;
        margin-top:-3px;
    ">
            Logout
        </a>
        
    </div>
<center><div><h1 style= "color: #111214; margin-trim: 10px; margin-right: 55px;" ><bold>Dashboard</bold></h1></div></center>
    <!-- 📦 Cards -->
    <div class="container">

        <div class="card"><h1>Students</h1>
            <a href="/students/" class="open-btn">Open</a>
        </div>

        <div class="card"><h1>Departments</h1>
            <a href="/departments/" class="open-btn">Open</a>
        </div>

        <div class="card"><h1>Faculty</h1>
            <a href="/faculty/" class="open-btn">Open</a>
        </div>

    </div>

</body>

</html>
