<!DOCTYPE html>
<html>
<head>
    <title>Faculty</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #14db6a, #d30c69);
        }

        .container {
            width: 80%;
            margin: 60px auto;
            background: #eaeaea;
            padding: 30px;
            border-radius: 15px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        /* Buttons */
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
        }

        .add-btn {
            background: #a210b6;
        }

        .home-btn {
            background: #a80fad;
            display: inline-block;
            margin-top: 20px;
        }

        .edit-btn {
            background: #22c55e;
        }

        .delete-btn {
            background: #f59e0b;
        }

        .btn:hover {
            opacity: 0.8;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        thead {
            background: #1e293b;
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        tbody tr {
            border-bottom: 1px solid #ccc;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Faculty List</h2>

    <a href="/faculty/add/" class="btn add-btn">Add Faculty</a>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Mobile</th>
                <th>Email</th>
                <th>Date of Join</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
        {% for f in faculty %}
            <tr>
                <td>{{ f.id }}</td>
                <td>{{ f.name }}</td>
                <td>{{ f.department }}</td>
                <td>{{ f.mobile }}</td>
                <td>{{ f.email }}</td>
                <td>{{ f.doj }}</td>
                <td>
                    <a href="/faculty/edit/{{ f.id }}/" class="btn edit-btn">Edit</a>
                    <a href="/faculty/delete/{{ f.id }}/"
                       class="btn delete-btn"
                       onclick="return confirm('Are you sure you want to delete?')">
                       Delete
                    </a>
                </td>
            </tr>
        {% endfor %}
        </tbody>

    </table>

    <a href="/dashboard/" class="btn home-btn">Home</a>

</div>

</body>
</html>
